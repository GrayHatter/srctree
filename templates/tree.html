<!DOCTYPE html>
<html>
  <head>
    <Build MetaHead _meta_head.html />
  </head>
  <body>
    <Build BodyHeader _body_header.html />
    <content class="mw">
        <Build TreeBlobHeader _base_repo_header.html />
      <repo class="landing">
        <intro>
        <span><a href="/repo/<RepoName />/branches"><BranchCount type="usize" /> branches</a></span>
        <span><CommitSlug /></span>
        <span class="muted"><CommitTimeHuman />&nbsp;<a href="/repo/<RepoName />/commit/<CommitHexShort/>"><CommitHexShort /></a></span>
        </intro>
        <div class="treelist">
          <With DotDot><tree><a href="<Href />">..</a></tree></With>
          <For Trees>
          <span class="tree"><a href="<Href />"><Name /></a><div><a href="<CommitHref />"><CommitTitle /></a><span><CommitTime /></span></div></span></For>
          <For Files>
          <span class="file"><a href="<Href />"><Name /></a><div><a href="<CommitHref />"><CommitTitle /></a><span><CommitTime /></span></div></span></For>
          <With Hidden>
          <details>
            <summary class="muted hide"><Count type="usize" /> hidden files</summary>
            <For HiddenFiles>
            <span class="<Class />"><a href="<Href />"><Name /></a><div><a href="<CommitHref />"><CommitTitle /></a><span><CommitTime /></span></div></span></For>
          </details>
          </With>
        </div>
      </repo>
      <Readme ornull>
    </content>
  </body>
</html>
