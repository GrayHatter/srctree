      <For Files>
        <patch>
        <details open="open">
          <summary>
          <header>
            <span><Filename /></span>
            <strong><DiffStat /></strong>
          </header>
          </summary>
          <changes>
            <Switch PatchView>
              <Case Inlined><DiffLines type="safe" /></Case>
              <Case Split><div class="split">
              <span><DiffLinesLeft type="safe" /></span>
              <span><DiffLinesRight type="safe" /></span>
            </div></Case>
            </Switch>
          </changes>
        </details>
        </patch>
      </For>
      <script defer>
        document.querySelectorAll("ln").forEach((elm) => {
          if (elm.id != '') { elm.addEventListener( "click", (e) => {
                let s = window.getSelection();
                const elm_y = elm.getBoundingClientRect().y;
                const in_view = elm_y < (window.innerHeight * 3 / 4) && elm_y > 0;
                if (in_view) { elm.style.cssText = `scroll-margin-top: ${elm_y}px`; }
                const not_selecting = s.anchorOffset == s.focusOffset;
                if (not_selecting) { window.location.hash = elm.id; }
              }, { passive: true }) }
        });
      </script>
